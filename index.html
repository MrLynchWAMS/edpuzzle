<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edpuzzle Archive Viewer & Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        edblue: { 50: '#eef4ff', 100: '#d9e6ff', 500: '#3b82f6', 600: '#0058FF', 700: '#0046cc' }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        .edpuzzle-richtext img { max-width: 100%; height: auto; border-radius: 0.375rem; margin-top: 0.5rem; }
        .view-transition { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-2">
                    <div class="bg-edblue-600 text-white p-1.5 rounded-lg">
                        <i class="ph-fill ph-puzzle-piece text-2xl"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-gray-900">Edpuzzle Archive</span>
                </div>
                <div class="flex items-center gap-3">
                    <button id="btn-export-all" class="hidden text-sm font-bold text-edblue-600 hover:bg-edblue-50 px-3 py-2 rounded-lg transition-colors flex items-center gap-2">
                        <i class="ph ph-download-simple"></i> Download Updated JSON
                    </button>
                    <button id="btn-load-new" class="hidden text-sm font-medium text-gray-500 hover:text-edblue-600 transition-colors flex items-center gap-1">
                        <i class="ph ph-plus-circle"></i> Import More
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col" id="app-container">
        <!-- VIEW 1: Upload -->
        <div id="view-upload" class="view-transition flex-grow flex items-center justify-center p-6">
            <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-gray-100 p-10 text-center">
                <div class="w-20 h-20 bg-edblue-50 text-edblue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="ph ph-archive text-4xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-900 mb-2">Library Empty</h2>
                <p class="text-gray-500 mb-8 text-sm">Upload your Edpuzzle JSON export to start organizing your lessons.</p>
                <input type="file" id="file-input" accept=".json" class="hidden">
                <button onclick="document.getElementById('file-input').click()" class="w-full bg-edblue-600 hover:bg-edblue-700 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-lg flex items-center justify-center gap-3">
                    <i class="ph ph-folder-open text-2xl"></i>
                    Open Archive File
                </button>
                <div id="upload-error" class="hidden mt-6 text-sm text-red-600 bg-red-50 p-4 rounded-xl border border-red-100 text-left"></div>
            </div>
        </div>

        <!-- VIEW 2: Dashboard -->
        <div id="view-dashboard" class="hidden view-transition flex-grow flex-col max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6">
                <div>
                    <h1 class="text-3xl font-black text-gray-900 tracking-tight">Lesson Library</h1>
                    <div class="flex gap-2 mt-2" id="folder-chips"></div>
                </div>
                <div class="flex gap-3 w-full md:w-auto">
                    <div class="relative flex-grow md:w-80">
                        <i class="ph ph-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="search-input" placeholder="Search lessons..." class="w-full pl-11 pr-4 py-3 bg-white border border-gray-200 rounded-2xl shadow-sm focus:ring-2 focus:ring-edblue-500 outline-none transition-all">
                    </div>
                </div>
            </div>

            <div id="video-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
            <div id="no-results" class="hidden text-center py-20 bg-white rounded-3xl border border-dashed border-gray-300">
                <i class="ph ph-monitor-play text-6xl text-gray-200 mb-4"></i>
                <h3 class="text-xl font-bold text-gray-400">No matches found</h3>
            </div>
        </div>

        <!-- VIEW 3: Detail -->
        <div id="view-detail" class="hidden view-transition flex-grow flex-col max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex items-center justify-between mb-6">
                <button id="btn-back" class="flex items-center gap-2 text-gray-500 hover:text-edblue-600 font-bold transition-colors">
                    <i class="ph ph-caret-left-bold"></i> Back to Library
                </button>
                <div class="flex items-center gap-3">
                    <span id="save-indicator" class="text-xs font-bold text-green-600 opacity-0 transition-opacity">Saved to Browser</span>
                    <button id="btn-edit-mode" class="flex items-center gap-2 bg-gray-100 hover:bg-edblue-600 hover:text-white text-gray-700 px-4 py-2 rounded-xl text-sm font-bold transition-all">
                        <i class="ph ph-pencil-simple"></i> Edit Answers & Tags
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Left -->
                <div class="lg:col-span-7 xl:col-span-8 space-y-6">
                    <div class="bg-black rounded-3xl overflow-hidden shadow-2xl aspect-video relative" id="video-player-container"></div>
                    <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm space-y-4">
                        <div class="flex justify-between items-start">
                            <h2 id="detail-title" class="text-2xl font-black text-gray-900 leading-tight"></h2>
                        </div>
                        <div class="flex flex-wrap gap-2" id="detail-tags-area"></div>
                        <div id="tag-editor" class="hidden flex gap-2">
                            <input type="text" id="new-tag-input" placeholder="Add tag (e.g. Physics, Grade 10)..." class="flex-grow text-sm border rounded-lg px-3 py-2 outline-none focus:ring-1 focus:ring-edblue-500">
                            <button id="btn-add-tag" class="bg-edblue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Add</button>
                        </div>
                    </div>
                </div>

                <!-- Right -->
                <div class="lg:col-span-5 xl:col-span-4 flex flex-col h-[700px] bg-white rounded-3xl border border-gray-200 overflow-hidden shadow-sm">
                    <div class="p-5 border-b flex justify-between items-center">
                        <h3 class="font-black text-gray-800 flex items-center gap-2">
                            <i class="ph ph-list-numbers text-edblue-600"></i> Lesson Flow
                        </h3>
                        <span id="detail-qcount" class="text-[10px] bg-gray-100 px-2 py-1 rounded-full font-bold text-gray-500"></span>
                    </div>
                    <div class="flex-grow overflow-y-auto p-5 space-y-4 bg-gray-50" id="questions-container"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // PERSISTENCE & DATA MANAGEMENT
        const state = {
            videos: JSON.parse(localStorage.getItem('ed_archive_videos')) || [],
            currentVideoId: null,
            editing: false,
            activeFolder: 'All'
        };

        const elements = {
            fileInput: document.getElementById('file-input'),
            uploadError: document.getElementById('upload-error'),
            btnLoadNew: document.getElementById('btn-load-new'),
            btnExportAll: document.getElementById('btn-export-all'),
            btnBack: document.getElementById('btn-back'),
            btnEditMode: document.getElementById('btn-edit-mode'),
            videoGrid: document.getElementById('video-grid'),
            dashboardStats: document.getElementById('dashboard-stats'),
            searchInput: document.getElementById('search-input'),
            noResults: document.getElementById('no-results'),
            playerContainer: document.getElementById('video-player-container'),
            detailTitle: document.getElementById('detail-title'),
            detailQCount: document.getElementById('detail-qcount'),
            questionsContainer: document.getElementById('questions-container'),
            detailTagsArea: document.getElementById('detail-tags-area'),
            tagEditor: document.getElementById('tag-editor'),
            newTagInput: document.getElementById('new-tag-input'),
            btnAddTag: document.getElementById('btn-add-tag'),
            saveIndicator: document.getElementById('save-indicator'),
            folderChips: document.getElementById('folder-chips')
        };

        // UI Initialization
        function init() {
            if (state.videos.length > 0) {
                renderDashboard();
                switchView('dashboard');
            }
            elements.fileInput.addEventListener('change', handleFileUpload);
            elements.btnLoadNew.addEventListener('click', () => { elements.fileInput.click(); });
            elements.btnBack.addEventListener('click', () => switchView('dashboard'));
            elements.searchInput.addEventListener('input', (e) => renderDashboard(e.target.value));
            elements.btnEditMode.addEventListener('click', toggleEditMode);
            elements.btnAddTag.addEventListener('click', addTag);
            elements.btnExportAll.addEventListener('click', exportFullData);
        }

        function saveState() {
            localStorage.setItem('ed_archive_videos', JSON.stringify(state.videos));
            elements.saveIndicator.style.opacity = '1';
            setTimeout(() => elements.saveIndicator.style.opacity = '0', 2000);
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const rawData = JSON.parse(e.target.result);
                    const incoming = normalizeEdpuzzleData(Array.isArray(rawData) ? rawData : [rawData]);
                    
                    // Merge logic: avoid duplicates by ID
                    const existingIds = new Set(state.videos.map(v => v.id));
                    const newVideos = incoming.filter(v => !existingIds.has(v.id));
                    state.videos = [...state.videos, ...newVideos];
                    
                    saveState();
                    renderDashboard();
                    switchView('dashboard');
                } catch (err) {
                    elements.uploadError.textContent = "Error: " + err.message;
                    elements.uploadError.classList.remove('hidden');
                }
            };
            reader.readAsText(file);
        }

        function normalizeEdpuzzleData(data) {
            return data.map(item => {
                const base = item.content || (item.medias && item.medias[0]) || item;
                const id = item._id || base._id || Math.random().toString(36).substr(2, 9);
                
                let youtubeId = base.youtubeId || item.youtubeId || base.videoId || item.videoId;
                if (!youtubeId && (base.url || item.url)) {
                    const match = (base.url || item.url).match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
                    youtubeId = (match && match[2].length === 11) ? match[2] : null;
                }

                const rawQ = base.questions || base.events || item.questions || item.events || [];
                const questions = rawQ.map((q, qIdx) => ({
                    id: q._id || `q-${qIdx}`,
                    time: q.time || 0,
                    type: q.type || 'multiple-choice',
                    body: (q.body || []).map(b => b.html || b.text || "").join("") || q.html || q.text || "",
                    choices: (q.choices || []).map((c, cIdx) => ({
                        id: c._id || `c-${cIdx}`,
                        text: (c.body || []).map(b => b.html || b.text || "").join("") || c.html || c.text || "Choice",
                        isCorrect: c.isCorrect === true || c.isCorrect === "true"
                    }))
                })).sort((a, b) => a.time - b.time);

                return {
                    id,
                    title: base.title || item.title || "Untitled Video",
                    duration: base.originalVideoDuration || item.originalVideoDuration || base.duration || 0,
                    youtubeId,
                    questions,
                    tags: [],
                    thumbnail: youtubeId ? `https://i.ytimg.com/vi/${youtubeId}/mqdefault.jpg` : 'https://via.placeholder.com/320x180'
                };
            });
        }

        function renderDashboard(searchTerm = '') {
            elements.videoGrid.innerHTML = '';
            
            // Filter by search and tags
            let filtered = state.videos.filter(v => v.title.toLowerCase().includes(searchTerm.toLowerCase()));
            if (state.activeFolder !== 'All') {
                filtered = filtered.filter(v => v.tags.includes(state.activeFolder));
            }

            // Render Folder Chips
            const allTags = [...new Set(state.videos.flatMap(v => v.tags))];
            elements.folderChips.innerHTML = `<button onclick="setFolder('All')" class="px-3 py-1 rounded-full text-xs font-bold transition-all ${state.activeFolder === 'All' ? 'bg-edblue-600 text-white' : 'bg-white border text-gray-500'}">All</button>`;
            allTags.forEach(tag => {
                elements.folderChips.innerHTML += `<button onclick="setFolder('${tag}')" class="px-3 py-1 rounded-full text-xs font-bold transition-all ${state.activeFolder === tag ? 'bg-edblue-600 text-white' : 'bg-white border text-gray-500'}">${tag}</button>`;
            });

            elements.noResults.classList.toggle('hidden', filtered.length > 0);
            elements.btnExportAll.classList.toggle('hidden', state.videos.length === 0);

            filtered.forEach(video => {
                const card = document.createElement('div');
                card.className = "group bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm hover:shadow-md transition-all cursor-pointer flex flex-col";
                card.onclick = () => openVideoDetail(video.id);
                card.innerHTML = `
                    <div class="relative aspect-video">
                        <img src="${video.thumbnail}" class="w-full h-full object-cover">
                        <div class="absolute bottom-2 right-2 bg-black/70 text-white text-[10px] px-1.5 py-0.5 rounded font-bold">${Math.floor(video.duration/60)}m</div>
                    </div>
                    <div class="p-4 flex-grow space-y-2">
                        <h3 class="font-bold text-gray-900 line-clamp-2 text-sm leading-snug">${video.title}</h3>
                        <div class="flex flex-wrap gap-1">
                            ${video.tags.map(t => `<span class="text-[9px] bg-edblue-50 text-edblue-600 px-1.5 py-0.5 rounded uppercase font-black">${t}</span>`).join('')}
                        </div>
                    </div>
                `;
                elements.videoGrid.appendChild(card);
            });
        }

        function setFolder(folder) {
            state.activeFolder = folder;
            renderDashboard(elements.searchInput.value);
        }

        function openVideoDetail(id) {
            state.currentVideoId = id;
            state.editing = false;
            const video = state.videos.find(v => v.id === id);
            
            elements.detailTitle.textContent = video.title;
            elements.detailQCount.textContent = `${video.questions.length} Items`;
            elements.playerContainer.innerHTML = video.youtubeId 
                ? `<iframe class="w-full h-full absolute inset-0" src="https://www.youtube-nocookie.com/embed/${video.youtubeId}?rel=0" frameborder="0" allowfullscreen></iframe>`
                : `<div class="absolute inset-0 flex items-center justify-center bg-gray-900 text-gray-500">Preview Unavailable</div>`;

            renderDetailUI();
            switchView('detail');
        }

        function renderDetailUI() {
            const video = state.videos.find(v => v.id === state.currentVideoId);
            
            // Tags
            elements.detailTagsArea.innerHTML = video.tags.map(t => `
                <div class="flex items-center gap-1 bg-edblue-50 text-edblue-700 px-3 py-1 rounded-full text-xs font-bold">
                    ${t}
                    ${state.editing ? `<i class="ph ph-x-circle cursor-pointer hover:text-red-500" onclick="removeTag('${t}')"></i>` : ''}
                </div>
            `).join('') || '<span class="text-gray-400 text-xs italic">No tags added</span>';

            elements.tagEditor.classList.toggle('hidden', !state.editing);
            elements.btnEditMode.innerHTML = state.editing ? '<i class="ph ph-check"></i> Done Editing' : '<i class="ph ph-pencil-simple"></i> Edit Answers & Tags';
            elements.btnEditMode.classList.toggle('bg-green-600', state.editing);
            elements.btnEditMode.classList.toggle('text-white', state.editing);

            // Questions
            elements.questionsContainer.innerHTML = '';
            video.questions.forEach((q, qIdx) => {
                const qDiv = document.createElement('div');
                qDiv.className = "bg-white p-4 rounded-xl border border-gray-200 shadow-sm space-y-3";
                
                let choicesHtml = '';
                if (q.choices.length > 0) {
                    choicesHtml = `<div class="space-y-1.5">`;
                    q.choices.forEach((c, cIdx) => {
                        const style = c.isCorrect ? 'bg-green-50 border-green-200 text-green-800' : 'bg-white border-gray-100 text-gray-500';
                        const icon = c.isCorrect ? 'ph-fill ph-check-circle text-green-500' : 'ph ph-circle text-gray-200';
                        
                        choicesHtml += `
                            <div onclick="${state.editing ? `toggleCorrect(${qIdx}, ${cIdx})` : ''}" 
                                 class="flex items-center gap-2 p-2 rounded-lg border text-xs cursor-pointer transition-all ${style} ${state.editing ? 'hover:border-edblue-300' : ''}">
                                <i class="${icon} text-base"></i>
                                <span>${c.text}</span>
                            </div>`;
                    });
                    choicesHtml += `</div>`;
                }

                qDiv.innerHTML = `
                    <div class="flex justify-between items-center text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                        <span>${q.type}</span>
                        <span class="text-edblue-500">${formatTime(q.time)}</span>
                    </div>
                    <div class="edpuzzle-richtext text-sm text-gray-700">${q.body}</div>
                    ${choicesHtml}
                `;
                elements.questionsContainer.appendChild(qDiv);
            });
        }

        function toggleEditMode() {
            state.editing = !state.editing;
            renderDetailUI();
            if (!state.editing) saveState();
        }

        function toggleCorrect(qIdx, cIdx) {
            const video = state.videos.find(v => v.id === state.currentVideoId);
            // Multiple choice behavior: toggle current, uncheck others if you want single-choice, 
            // but Edpuzzle supports multi-correct, so we just toggle.
            video.questions[qIdx].choices[cIdx].isCorrect = !video.questions[qIdx].choices[cIdx].isCorrect;
            renderDetailUI();
        }

        function addTag() {
            const tag = elements.newTagInput.value.trim();
            if (!tag) return;
            const video = state.videos.find(v => v.id === state.currentVideoId);
            if (!video.tags.includes(tag)) {
                video.tags.push(tag);
                elements.newTagInput.value = '';
                renderDetailUI();
            }
        }

        function removeTag(tag) {
            const video = state.videos.find(v => v.id === state.currentVideoId);
            video.tags = video.tags.filter(t => t !== tag);
            renderDetailUI();
        }

        function exportFullData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state.videos, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "edpuzzle_archive_updated.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function switchView(viewName) {
            ['view-upload', 'view-dashboard', 'view-detail'].forEach(id => {
                document.getElementById(id).classList.toggle('hidden', id !== `view-${viewName}`);
            });
            elements.btnLoadNew.classList.toggle('hidden', viewName === 'upload');
            if (viewName === 'detail') window.scrollTo(0, 0);
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }

        init();
    </script>
</body>
</html>
